name: Build and Release Exe

on:
  push:
    branches: [ "main" ] # mainにpushしたら即実行

jobs:
  build_and_release:
    runs-on: windows-latest
    permissions: # Releaseを作るために必須の権限
      contents: write

    steps:
    - uses: actions/checkout@v4

    # 1. TSをビルド (ClientApp フォルダへ移動して実行)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Build TS
      run: |
        cd ClientApp
        npm install
        npm run build

    # 2. .NETをビルドしてEXE化
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Publish EXE
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=false -o ./output

    # 3. Releaseページにアップロード
    - name: Create Release and Upload EXE
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "latest-build"
        name: "Latest Auto Build"
        files: ./output/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
